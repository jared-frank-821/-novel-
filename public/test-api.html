<!DOCTYPE html>
<html>
<head>
    <title>测试 API</title>
</head>
<body>
    <h1>测试 API 端点</h1>
    <button onclick="testAPI()">测试 /api/chat</button>
    <div id="result" style="margin-top: 20px; padding: 10px; border: 1px solid #ccc; min-height: 100px;"></div>

    <script>
        async function testAPI() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '正在测试 API...';
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        prompt: '从前有一个小村庄，村里住着一个善良的老人。'
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP 错误: ${response.status}`);
                }
                
                const data = await response.json();
                resultDiv.innerHTML = `<strong>成功!</strong><br>响应: ${JSON.stringify(data, null, 2)}`;
            } catch (error) {
                resultDiv.innerHTML = `<strong>错误:</strong> ${error.message}`;
            }
        }
    </script>
</body>
</html>
